<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Draw</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
    :root {
        --rain-dark: #1e3c72;
        --rain-light: #2a5298;
        --leaf-green: #40916c;
        --puddle-blue: #a2d2ff;
        --glass-white: rgba(255, 255, 255, 0.15);
    }

    body {
        /* พื้นหลังไล่เฉดสีฟ้าหม่นเหมือนท้องฟ้าก่อนฝนตก */
        background: linear-gradient(180deg, #2c3e50 0%, #4ca1af 100%);
        background-attachment: fixed;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* สร้างหยดน้ำปลอมๆ กระจายทั่วจอ */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: 
            radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 1px, transparent 1px),
            radial-gradient(circle at 50% 70%, rgba(255,255,255,0.1) 2px, transparent 2px),
            radial-gradient(circle at 80% 40%, rgba(255,255,255,0.1) 1.5px, transparent 1.5px);
        background-size: 100px 100px;
        z-index: 0;
    }

    .container {
        /* สไตล์กระจกฝ้า (Glassmorphism) */
        background: var(--glass-white);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 40px;
        box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        color: white;
    }

    h1 {
        color: #fff;
        text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    p.subtitle {
        color: var(--puddle-blue);
        font-weight: 300;
    }

    textarea {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: white;
        border-radius: 15px;
    }
    textarea::placeholder { color: rgba(255,255,255,0.6); }
    textarea:focus { background: rgba(255, 255, 255, 0.3); color: white; }

    .setting-box {
        background: rgba(0, 0, 0, 0.2);
        border: none;
        color: white;
    }

    select {
        background: var(--rain-dark);
        color: white;
        border: 1px solid var(--puddle-blue);
    }

    /* ปุ่มสีเขียวใบไม้ชุ่มน้ำ */
    .btn-splash {
        background: linear-gradient(135deg, var(--leaf-green), #2d6a4f);
        box-shadow: 0 6px 0px #1b4332;
        border-radius: 15px;
    }
    .btn-splash:hover { box-shadow: 0 4px 0px #1b4332; }

    /* การ์ดผู้โชคดีเหมือนก้อนเมฆหรือฟองสบู่ */
    .winner-card {
        background: white;
        color: var(--rain-dark);
        border: none;
        border-radius: 50px; /* ทรงมนๆ เหมือนหยดน้ำ */
        box-shadow: 0 10px 20px rgba(0,0,0,0.1), inset 0 -5px 10px rgba(0,0,0,0.05);
        padding: 15px 30px;
    }

    #countdown-overlay {
        background: rgba(30, 60, 114, 0.95);
    }
</style>
</head>
<body>

<div class="container" id="setup-view">
    <h1>💦 สงกรานต์สำราญใจ</h1>
    <p class="subtitle">สาดน้ำ สาดรางวัล กระจายความสุข!</p>
    
    <textarea id="nameInput" placeholder="ใส่ชื่อเพื่อนพนักงานที่นี่...&#10;ก๊อปปี้จาก Excel มาวางได้เลย (1 ชื่อต่อบรรทัด)"></textarea>

    <div class="setting-box">
        <span>เลือกจำนวนผู้โชคดี:</span>
        <select id="luckyAmount">
            <option value="1">1 ท่าน</option>
            <option value="5">5 ท่าน</option>
            <option value="10">10 ท่าน</option>
            <option value="15">15 ท่าน</option>
        </select>
    </div>

    <button class="btn-splash" onclick="toDrawPage()">เข้าสู่หน้าสุ่มรางวัล ✨</button>
</div>

<div class="container hidden" id="draw-view">
    <h1 id="title-text">เตรียมตัวรับโชค!</h1>
    <p id="desc-text" class="subtitle">ใครจะเป็นผู้โชคดีในเทศกาลสาดน้ำนี้?</p>
    
    <div id="result-area" class="winner-list"></div>

    <div style="margin-top: 30px;">
        <button class="btn-splash" id="spinBtn" onclick="startSongkranDraw()">เริ่มสาดความโชคดี! 💦</button>
        <span class="back-btn" onclick="toSetupPage()">← กลับไปตั้งค่ารายชื่อ</span>
    </div>
</div>

<div id="countdown-overlay">
    <div class="timer-text" id="timer-val">3</div>
    <h2 style="color: white; margin-top: 20px;">ระวัง... เตรียมเปียก!</h2>
</div>

<script>
    let names = [];

    function toSetupPage() {
        document.getElementById('setup-view').classList.remove('hidden');
        document.getElementById('draw-view').classList.add('hidden');
    }

    function toDrawPage() {
        const input = document.getElementById('nameInput').value;
        names = input.split('\n').map(n => n.trim()).filter(n => n !== "");

        if (names.length === 0) {
            alert("ใสรายชื่อก่อนจ้า เดี๋ยวไม่มีคนได้รางวัลนะ!");
            return;
        }

        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('draw-view').classList.remove('hidden');
        document.getElementById('result-area').innerHTML = "";
        document.getElementById('title-text').innerText = "เตรียมตัวรับโชค!";
    }

    function startSongkranDraw() {
        const overlay = document.getElementById('countdown-overlay');
        const timerVal = document.getElementById('timer-val');
        const amount = parseInt(document.getElementById('luckyAmount').value);

        overlay.style.display = 'flex';
        let count = 3;
        timerVal.innerText = count;

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                timerVal.innerText = count;
            } else if (count === 0) {
                timerVal.innerText = "เฮ้!";
            } else {
                clearInterval(interval);
                overlay.style.display = 'none';
                doRandom(amount);
            }
        }, 1000);
    }

    function doRandom(amount) {
        const resultArea = document.getElementById('result-area');
        const title = document.getElementById('title-text');
        const btn = document.getElementById('spinBtn');
        
        resultArea.innerHTML = "";
        title.innerText = "🎉 ยินดีด้วยกับผู้โชคดี! 🎉";
        btn.innerText = "สุ่มใหม่อีกรอบ 💦";

        let pool = [...names];
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }

        const winners = pool.slice(0, amount);

        winners.forEach((name, i) => {
            setTimeout(() => {
                const card = document.createElement('div');
                card.className = 'winner-card';
                card.innerText = "💧 " + name;
                resultArea.appendChild(card);
                
                // เอฟเฟกต์พลุกระดาษเล็กๆ (ถ้ามีเครื่องแรงๆ)
                if(i === winners.length - 1) {
                    confettiEffect();
                }
            }, i * 300);
        });
    }

    function confettiEffect() {
        // คุณสามารถเพิ่ม Library confetti.js ภายหลังได้ถ้าต้องการความอลังการ
        console.log("สุ่มเรียบร้อย!");
    }
</script>

</body>
</html>
